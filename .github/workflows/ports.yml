name: ports
on: [push, pull_request]
permissions:
  contents: read
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install pytest
          python -m pytest -q

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o /tmp/c2detect .

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo build --release

  javascript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node test.js

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npx tsc --noEmit
      - run: node --experimental-strip-types --test index.test.ts

  shell:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/shell
    steps:
      - uses: actions/checkout@v4
      - run: |
          if command -v shellcheck >/dev/null; then shellcheck c2detect.sh || true; fi
          sh test.sh
